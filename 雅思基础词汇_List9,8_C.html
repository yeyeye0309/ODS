            <button class="btn-reset" onclick="resetQuiz()">↺ 重置</button>
        </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="content">
        <div class="tips">
            <strong>💡 提示：</strong>点击"开始默写"后倒计时开始，在输入框中填写英文单词对应的中文释义。系统支持模糊匹配（忽略标点、大小写）。按 Enter 键快速跳转。答案仅在提交后显示。倒计时结束将自动提交。
        </div>

        <div style="display:flex; align-items:center; margin-bottom:15px; gap:10px; flex-wrap:wrap;">

        </div>

        <div class="word-grid" id="wordGrid"></div>

        <div class="action-bar">
            <button class="action-btn btn-submit" onclick="submitQuiz()">✓ 提交批改</button>

        </div>

        <div class="stats" id="stats">

            <div class="stat-box"><div class="stat-num" id="statWrong" style="color:#dc3545">0</div><div class="stat-label">错误</div></div>
            <div class="stat-box"><div class="stat-num" id="statPending" style="color:#ffc107">0</div><div class="stat-label">未答</div></div>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="score-circle" id="scoreCircle"><div class="score-text" id="scoreText">0%</div></div>

    "孤立"
  ],
  "flavour": [
    "n.味道",
    "v.给……调味"
  ],
  "inferior": [
    "adj.比不上……的",
    "下级的",
    "下等的",
    "质量低劣的"
  ],
  "hazard": [
    "n.危险",
    "公害",
    "v.冒……风险"
  ],
  "attain": [
    "v.获得",
    "达到"
  ],
  "acid": [
    "adj.酸性的",
    "酸的",
    "尖刻的",
    "n.酸"
  ],
  "log": [
    "v.伐木",
    "记录",
    "n.原木",
    "航海日志"
  ]
};
    const book_name = "雅思基础词汇";
    const totalSeconds = 900;

    let originalWords = Object.keys(vocabularyDB);
    let words = [...originalWords];
    let timerInterval = null;
    let remainingSeconds = totalSeconds;
    let isRunning = false;
    let isPaused = false;
    let submitted = false;
    let userAnswers = {};
    let currentMistakes = [];  // 存储错题数据

    // 全局禁用右键/长按菜单（防作弊），但不影响输入框
    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName !== 'INPUT') e.preventDefault();
    });

    function formatTime(sec) {
        const mins = Math.floor(sec / 60);
        const s = sec % 60;
        return `${mins.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
        const timerDiv = document.getElementById('timer');
        timerDiv.textContent = formatTime(remainingSeconds);
        if (remainingSeconds <= 60) {
            timerDiv.classList.add('warning');
        } else {
            timerDiv.classList.remove('warning');
        }
    }

    function startQuiz() {
        if (isRunning) return;
        if (submitted) {
            alert('已经提交过了，如需重新开始请点击“重置”。');
            return;
        }
        const studentName = document.getElementById('studentName').value.trim();
        if (!studentName) {
            alert('请先填写学生姓名！');
            return;
        }
        isRunning = true;
        isPaused = false;
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnPause').style.display = 'inline-block';
        document.querySelectorAll('.word-input').forEach(inp => inp.disabled = false);
        document.getElementById('input-0').focus();
        timerInterval = setInterval(() => {
            if (!isPaused && remainingSeconds > 0) {
                remainingSeconds--;
                updateTimerDisplay();
                if (remainingSeconds === 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    alert('时间到！系统将自动提交。');
                    submitQuiz();
                }
            }
        }, 1000);
    }

    function pauseQuiz() {
        if (!isRunning || isPaused) return;
        isPaused = true;
        clearInterval(timerInterval);
        document.getElementById('btnPause').textContent = '▶ 继续';
        document.getElementById('btnPause').onclick = resumeQuiz;
        document.querySelectorAll('.word-input').forEach(inp => inp.disabled = true);
    }

    function resumeQuiz() {
        if (!isPaused) return;
        isPaused = false;
        document.getElementById('btnPause').textContent = '⏸ 暂停';
        document.getElementById('btnPause').onclick = pauseQuiz;
        document.querySelectorAll('.word-input').forEach(inp => inp.disabled = false);
        timerInterval = setInterval(() => {
            if (!isPaused && remainingSeconds > 0) {
                remainingSeconds--;
                updateTimerDisplay();
                if (remainingSeconds === 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    alert('时间到！系统将自动提交。');
                    submitQuiz();
                }
            }
        }, 1000);
    }

    function resetQuiz() {
        clearInterval(timerInterval);
        remainingSeconds = totalSeconds;
        isRunning = false;
        isPaused = false;
        submitted = false;
        userAnswers = {};
        document.getElementById('timer').textContent = formatTime(totalSeconds);
        document.getElementById('timer').classList.remove('warning');
        document.getElementById('btnStart').style.display = 'inline-block';
        document.getElementById('btnPause').style.display = 'none';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('resultPanel').classList.remove('show');
        document.querySelectorAll('.word-item').forEach(item => {
            item.classList.remove('correct', 'wrong', 'pending');
        });
        document.querySelectorAll('.word-input').forEach(inp => { inp.value = ''; inp.disabled = true; });
        document.querySelectorAll('.word-answer').forEach(ans => ans.textContent = '');
        updateStats();
        renderWords();
    }

    function renderWords() {
        const grid = document.getElementById('wordGrid');
        grid.innerHTML = '';
        words.forEach((word, idx) => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.id = `item-${idx}`;
            div.innerHTML = `
                <div class="word-num">${idx + 1}</div>
                <div style="flex:1;">
                    <div style="font-weight:600; margin-bottom:4px;">${word}</div>
                    <input type="text" class="word-input" id="input-${idx}" 
                           placeholder="请输入中文释义" 
                           onkeydown="handleEnter(event, ${idx})"
                           oninput="onInput(${idx})"
                           disabled>
                    <span class="word-answer" id="answer-${idx}"></span>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    function handleEnter(e, idx) {
        if (e.key === 'Enter') {
            const next = document.getElementById(`input-${idx + 1}`);
            if (next) next.focus();
        }
    }

    function onInput(idx) {
        const input = document.getElementById(`input-${idx}`);
        userAnswers[idx] = input.value.trim();
        updateProgress();
    }

    function updateProgress() {
        const filled = Object.values(userAnswers).filter(v => v && v.length > 0).length;
        const pct = (filled / words.length * 100).toFixed(1);
        document.getElementById('progressFill').style.width = pct + '%';
    }

    function normalizeAnswer(ans) {
        let s = ans.trim().toLowerCase();
        s = s.replace(/[，,。？?！!、；;：:·“”‘’《》【】（）]/g, '');
        return s;
    }

    function fuzzyMatch(userAns, correctList) {
        if (!userAns) return false;
        const cleanUser = normalizeAnswer(userAns);
        if (cleanUser === "") return false;
        for (let std of correctList) {
            const cleanStd = normalizeAnswer(std);
            if (cleanUser === cleanStd) return true;
            if (cleanUser.includes(cleanStd)) return true;
            if (cleanStd.includes(cleanUser)) return true;
        }
        return false;
    }

    function submitQuiz() {
        if (submitted) return;
        const studentName = document.getElementById('studentName').value.trim();
        if (!studentName) {
            alert('请先填写学生姓名！');
            return;
        }
        if (!isRunning && remainingSeconds === totalSeconds) {
            if (!confirm('尚未开始默写，是否直接提交？')) return;
        }
        if (isRunning && !isPaused) pauseQuiz();
        submitted = true;
        let correct = 0, wrong = 0, pending = 0;
        const mistakes = [];
        words.forEach((word, idx) => {
            const input = document.getElementById(`input-${idx}`);
            const item = document.getElementById(`item-${idx}`);
            const userAns = (input.value || '').trim();
            const correctAnswers = vocabularyDB[word] || [word];
            item.classList.remove('correct', 'wrong', 'pending');
            if (!userAns) {
                item.classList.add('pending');
                pending++;
                mistakes.push({ word, userAns: '(未作答)', correctAns: correctAnswers.join(' / ') });
            } else if (fuzzyMatch(userAns, correctAnswers)) {
                item.classList.add('correct');
                correct++;
            } else {
                item.classList.add('wrong');
                wrong++;
                mistakes.push({ word, userAns, correctAns: correctAnswers.join(' / ') });
            }
            const answerSpan = document.getElementById(`answer-${idx}`);
            answerSpan.textContent = correctAnswers.join(' / ');
            item.classList.add('show-answer');
        });
        currentMistakes = mistakes;  // 保存错题列表供PDF导出使用
        document.getElementById('statCorrect').textContent = correct;
        document.getElementById('statWrong').textContent = wrong;
        document.getElementById('statPending').textContent = pending;
        const total = words.length;
        const score = Math.round(correct / total * 100);
        const scoreDeg = (correct / total * 360).toFixed(1);
        document.getElementById('scoreCircle').style.setProperty('--score-deg', scoreDeg + 'deg');
        document.getElementById('scoreText').textContent = score + '%';
        let title = '';
        if (score >= 90) title = '🎉 太棒了！几乎全对！';
        else if (score >= 80) title = '👍 很好！继续保持！';
        else if (score >= 60) title = '💪 及格了！还有提升空间！';
        else title = '📚 需要加油！多复习几遍！';
        document.getElementById('resultTitle').textContent = title;
        document.getElementById('resultDesc').textContent = 
            `学生：${studentName} | 剩余时间 ${formatTime(remainingSeconds)} | 正确 ${correct}/${total} | 错误 ${wrong} | 未答 ${pending}`;
        const mistakeList = document.getElementById('mistakeList');
        if (mistakes.length > 0) {
            mistakeList.innerHTML = '<h4 style="margin-bottom:10px;">📋 错题回顾</h4>' +
                mistakes.map(m => `
                    <div class="mistake-item">
                        <span><strong>${m.word}</strong></span>
                        <span>你的答案: <span class="your-answer">${m.userAns}</span> → 正确答案: <span class="correct-answer">${m.correctAns}</span></span>
                    </div>
                `).join('');
        } else {
            mistakeList.innerHTML = '<p style="color:#28a745; font-weight:bold;">🌟 全对！没有任何错误！</p>';
        }
        document.getElementById('resultPanel').classList.add('show');
        document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
        clearInterval(timerInterval);
    }

    function updateStats() {
        document.getElementById('statTotal').textContent = words.length;
        document.getElementById('statCorrect').textContent = '0';
        document.getElementById('statWrong').textContent = '0';
        document.getElementById('statPending').textContent = words.length;
    }

    function shuffleWords() {
        if (isRunning) {
            if (!confirm('打乱顺序将重置当前进度，是否继续？')) return;
            resetQuiz();
        }
        for (let i = words.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [words[i], words[j]] = [words[j], words[i]];
        }
        renderWords();
        updateStats();
    }

    // 构建错题表格HTML
    function buildMistakeTable() {
        if (currentMistakes.length === 0) {
            return '<p style="text-align:center; font-size:16px; color:#28a745;">🌟 恭喜！本次默写全对，没有错误单词！</p>';
        }
        let tableHtml = `
            <table class="pdf-table">
                <thead>
                    <tr>
                        <th style="width:8%">序号</th>
                        <th style="width:25%">英文单词</th>
                        <th style="width:33%">你的答案</th>
                        <th style="width:34%">正确答案</th>
                    </tr>
                </thead>
                <tbody>
        `;
        currentMistakes.forEach((mistake, idx) => {
            tableHtml += `
                <tr>
                    <td>${idx + 1}</td>
                    <td><span class="wrong-word">${mistake.word}</span></td>
                    <td>${mistake.userAns}</td>
                    <td><span class="correct-answer-pdf">${mistake.correctAns}</span></td>
                </tr>
            `;
        });
        tableHtml += `</tbody>
        </table>`;
        return tableHtml;
    }

    // PDF导出功能
    async function exportToPDF() {
        if (!submitted) {
            alert('请先提交批改！');
            return;
        }
        
        const studentName = document.getElementById('studentName').value.trim() || '未填写';
        const correctCount = document.getElementById('statCorrect').textContent;
        const wrongCount = document.getElementById('statWrong').textContent;
        const pendingCount = document.getElementById('statPending').textContent;
        const score = document.getElementById('scoreText').textContent;
        
        // 构建PDF内容（独立的HTML结构，便于精确控制样式）
        const mistakeTableHtml = buildMistakeTable();
        const pdfContent = `
            <div style="width:100%; max-width:800px; margin:0 auto; padding:20px; font-family:'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;">
                <h1 style="text-align:center; color:#667eea; margin-bottom:20px;">📄 雅思基础词汇 默写报告</h1>
                <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin-bottom:20px;">
                    <p><strong>👩‍🎓 学生姓名：</strong> ${studentName}</p>
                    <p><strong>📅 测试日期：</strong> 2026.05.24</p>
                    <p><strong>📖 默写范围：</strong> List9,8</p>
                    <p><strong>📚 测试列表：</strong> C</p>
                    <p><strong>⏱️ 剩余时间：</strong> ${formatTime(remainingSeconds)}</p>
                </div>
                <div style="background:white; border:1px solid #e0e0e0; border-radius:10px; padding:15px; margin-bottom:20px;">
                    <h3 style="margin:0 0 10px 0; color:#333;">📊 成绩统计</h3>
                    <ul style="list-style:none; padding:0;">
                        <li>✅ 正确：<strong>${correctCount}</strong> 题</li>
                        <li>❌ 错误：<strong>${wrongCount}</strong> 题</li>
                        <li>⏳ 未答：<strong>${pendingCount}</strong> 题</li>
                        <li>🏆 正确率：<strong style="color:#667eea; font-size:20px;">${score}</strong></li>
                    </ul>
                </div>
                <div style="background:white; border:1px solid #e0e0e0; border-radius:10px; padding:15px;">
                    <h3 style="margin:0 0 15px 0; color:#dc3545;">📋 错题详情（表格形式）</h3>
                    ${mistakeTableHtml}
                </div>
                <div style="text-align:center; margin-top:30px; font-size:12px; color:#999;">
                    生成时间：${new Date().toLocaleString()} | 系统自动生成
                </div>
            </div>
        `;
        
        // 将内容放入隐藏容器
        const container = document.getElementById('pdf-export-container');
        container.innerHTML = pdfContent;
        
        // 显示加载提示
        const exportBtn = document.querySelector('.btn-export');
        const originalText = exportBtn.textContent;
        exportBtn.textContent = '⏳ 正在生成 PDF...';
        exportBtn.disabled = true;
        
        try {
            // 等待一帧，确保DOM渲染完成
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const element = container;
            const canvas = await html2canvas(element, {
                scale: 3,
                backgroundColor: '#ffffff',
                useCORS: true,
                logging: false
            });
            
            const imgData = canvas.toDataURL('image/png', 1.0);
            // 注意：此处需要使用 window.jspdf 全局对象
            const { jsPDF } = window.jspdf;
            const imgWidth = 210;  // A4宽度 mm
            const pageHeight = 297; // A4高度 mm
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let pdf = new jsPDF('p', 'mm', 'a4');
            let heightLeft = imgHeight;
            let position = 0;
            
            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;
            
            while (heightLeft > 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
            }
            
            const filename = `雅思基础词汇_默写报告_${studentName}_${new Date().toISOString().slice(0,10)}.pdf`;
            pdf.save(filename);
            
        } catch (error) {
            console.error('PDF生成失败:', error);
            alert('PDF生成失败：' + error.message);
        } finally {
            // 恢复按钮
            exportBtn.textContent = originalText;
            exportBtn.disabled = false;
            // 清空隐藏容器
            container.innerHTML = '';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderWords();
        updateStats();
    });
</script>
